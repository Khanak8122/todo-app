<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #0a0a0a;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #6c63ff; }

    button.add-btn {
      padding: 10px 18px;
      background: #0d042f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #574fd6; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f8f8fb;
      border: 1px solid #ececec;
      transition: opacity 0.2s;
    }

    .todo-item.done { opacity: 0.5; }

    .todo-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-title {
      flex: 1;
      font-size: 14px;
      color: #333;
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: #aaa;
    }

    button.del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    button.del-btn:hover { color: #e74c3c; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>My Todos</h1>
    <div class="input-row">
      <input type="text" id="input" placeholder="Add a new todo..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <div id="list"></div>
  </div>

  <script>
    const API = 'http://localhost:3000/todos';

    async function fetchTodos() {
      const res = await fetch(API);
      const todos = await res.json();
      const list = document.getElementById('list');
      if (todos.length === 0) {
        list.innerHTML = '<div class="empty">No todos yet. Add one above!</div>';
        return;
      }
      list.innerHTML = todos.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})" />
          <span class="todo-title">${t.title}</span>
          <button class="del-btn" onclick="deleteTodo(${t.id})">×</button>
        </div>
      `).join('');
    }

    async function addTodo() {
      const input = document.getElementById('input');
      const title = input.value.trim();
      if (!title) return;
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      fetchTodos();
    }

    async function toggleTodo(id) {
      await fetch(`${API}/${id}`, { method: 'PUT' });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      fetchTodos();
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
