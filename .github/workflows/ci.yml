# Name shows up on GitHub under the Actions tab
name: CI Pipeline

# TRIGGER — when does this pipeline run?
on:
  push:
    branches: [ main ]      # runs when you push to main
  pull_request:
    branches: [ main ]      # runs when you open a PR to main

#Defines tasks/jobs pipeline should perform.
jobs:
  test:
    # GitHub spins up a fresh Ubuntu Linux machine for this job
    runs-on: ubuntu-latest

    # These are like docker-compose services — starts a Postgres
    # container alongside your app so tests have a real database
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todos
        ports:
          - 5432:5432
        # Wait until Postgres is actually ready before continuing
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step 1 — checkout your code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — install Node.js 18 on the GitHub machine
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'           # caches node_modules between runs — faster

      # Step 3 — install your dependencies
      - name: Install dependencies
        run: npm install

      # Step 4 — install Playwright (no browsers needed for API tests)
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # Step 5 — start your Node server in the background
      # The & at the end means "run this and don't wait — continue to next step"
      - name: Start server
        run: node index.js &
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: todos
          PORT: 3000

      # Step 6 — wait for server to be ready before running tests
      # Without this, tests might start before the server is up
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/todos --timeout 30000

      # Step 7 — run your Playwright tests
      - name: Run Playwright API tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: todos

      # Step 8 — upload test report even if tests fail
      # So you can download and inspect failures on GitHub
      - name: Upload test report
        if: always()           # runs even if previous steps failed
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Step 9 — build the Docker image to verify Dockerfile is not broken
      # This doesn't push the image anywhere yet — just proves it builds cleanly
      - name: Build Docker image
        run: docker build -t todo-app:${{ github.sha }} .